name: Build and deploy images (Aliyun ACR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  # 公网 endpoint:GitHub Actions(境外 runner)登录 + 推送用
  REGISTRY: tally-acr-registry.cn-hangzhou.cr.aliyuncs.com
  ACR_NAMESPACE: tally-acr
  IMAGE_PREFIX: tally-acr-registry.cn-hangzhou.cr.aliyuncs.com/tally-acr
  # VPC 内网 endpoint:ECS(同 VPC)登录 + 拉取用,免公网流量、更快
  REGISTRY_VPC: tally-acr-registry-vpc.cn-hangzhou.cr.aliyuncs.com
  IMAGE_PREFIX_VPC: tally-acr-registry-vpc.cn-hangzhou.cr.aliyuncs.com/tally-acr
  IMAGE_TAG: main-${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Python runtime
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.python
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/tally-python:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/tally-python:prod-latest
          build-args: |
            OCI_SOURCE=https://github.com/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=tally-python
          cache-to: type=gha,mode=max,scope=tally-python

      - name: Build and push finance-web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/finance-web:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_PREFIX }}/finance-web:prod-latest
          build-args: |
            OCI_SOURCE=https://github.com/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=finance-web
          cache-to: type=gha,mode=max,scope=finance-web

      - name: Deploy to ECS
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_DEPLOY_DIR: ${{ secrets.PROD_DEPLOY_DIR }}
        run: |
          set -euo pipefail
          : "${PROD_DEPLOY_DIR:=/opt/tally}"

          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/tally_prod_key
          chmod 600 ~/.ssh/tally_prod_key

          ssh -i ~/.ssh/tally_prod_key -o StrictHostKeyChecking=no "$PROD_SSH_USER@$PROD_HOST" \
            "mkdir -p '$PROD_DEPLOY_DIR'"

          scp -i ~/.ssh/tally_prod_key -o StrictHostKeyChecking=no \
            docker-compose.prod.yml "$PROD_SSH_USER@$PROD_HOST:$PROD_DEPLOY_DIR/docker-compose.prod.yml"

          ssh -i ~/.ssh/tally_prod_key -o StrictHostKeyChecking=no "$PROD_SSH_USER@$PROD_HOST" \
            "test -f '$PROD_DEPLOY_DIR/.env.prod'"

          ssh -i ~/.ssh/tally_prod_key -o StrictHostKeyChecking=no "$PROD_SSH_USER@$PROD_HOST" \
            "cd '$PROD_DEPLOY_DIR' && \
             echo '${{ secrets.ACR_PASSWORD }}' | docker login ${{ env.REGISTRY_VPC }} -u '${{ secrets.ACR_USERNAME }}' --password-stdin && \
             (cp deploy.env deploy.env.prev 2>/dev/null || true) && \
             printf '%s\n' \
               'IMAGE_PREFIX=${{ env.IMAGE_PREFIX_VPC }}' \
               'IMAGE_TAG=${{ env.IMAGE_TAG }}' \
               'DB_POOL=1' \
               'DB_POOL_MAXCONN=16' > deploy.env && \
             set -a && . ./deploy.env && set +a && \
             docker compose --env-file deploy.env -f docker-compose.prod.yml pull && \
             docker compose --env-file deploy.env -f docker-compose.prod.yml run --rm --no-deps finance-mcp python -m auth.migrate && \
             docker compose --env-file deploy.env -f docker-compose.prod.yml up -d --remove-orphans && \
             curl -fsS http://127.0.0.1:3335/health >/dev/null && \
             curl -fsS http://127.0.0.1:8100/health >/dev/null && \
             curl -fsS http://127.0.0.1:5173/health >/dev/null"
